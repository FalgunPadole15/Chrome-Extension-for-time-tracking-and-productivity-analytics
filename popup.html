<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TimeTracker</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>

  <div class="header">
    <h1>⏱ TimeTracker</h1>
    <p class="date" id="todayDate"></p>
  </div>

  <!-- summary cards -->
  <div class="summary">
    <div class="card productive">
      <div class="card-label">Productive</div>
      <div class="card-value" id="productiveTime">0h 0m</div>
    </div>
    <div class="card unproductive">
      <div class="card-label">Unproductive</div>
      <div class="card-value" id="unproductiveTime">0h 0m</div>
    </div>
    <div class="card total">
      <div class="card-label">Total Today</div>
      <div class="card-value" id="totalTime">0h 0m</div>
    </div>
  </div>

  <!-- productivity score -->
  <div class="score-section">
    <div class="score-label">Productivity Score</div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="score-text" id="scoreText">0%</div>
  </div>

  <!-- tabs -->
  <div class="tabs">
    <button class="tab-btn active" id="tabToday" onclick="showTab('today')">Today</button>
    <button class="tab-btn" id="tabWeek" onclick="showTab('week')">This Week</button>
  </div>

  <!-- today tab content -->
  <div id="todayContent">
    <div class="section-title">Top Sites Today</div>
    <div id="siteList">
      <p class="no-data">No data yet. Start browsing!</p>
    </div>
  </div>

  <!-- week tab content -->
  <div id="weekContent" style="display:none;">
    <div class="section-title">Weekly Summary</div>
    <div id="weekList">
      <p class="no-data">No weekly data yet.</p>
    </div>
    <div class="section-title" style="margin-top:10px;">Daily Breakdown</div>
    <div id="dailyBreakdown"></div>
  </div>

  <!-- footer buttons -->
  <div class="footer">
    <button onclick="openOptions()">⚙ Settings</button>
    <button onclick="clearToday()">🗑 Clear Today</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
